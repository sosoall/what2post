<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>what2post Waitlist</title>
    <style>
      :root {
        --bg: #f7f0e3;
        --card: rgba(255, 252, 246, 0.94);
        --ink: #111111;
        --muted: rgba(17, 17, 17, 0.66);
        --border: rgba(17, 17, 17, 0.1);
        --accent: #111111;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.55), transparent 48%),
          var(--bg);
        color: var(--ink);
      }

      .shell {
        width: min(720px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 64px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
        margin-bottom: 20px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: 0 24px 60px rgba(17, 17, 17, 0.08);
        padding: 28px;
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(32px, 6vw, 48px);
        line-height: 1.05;
      }

      .sub {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.6;
      }

      #waitlist-root {
        min-height: 280px;
      }

      .error {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(17, 17, 17, 0.06);
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <a class="back-link" href="/">← Back to what2post</a>

      <section class="card">
        <p class="eyebrow">what2post waitlist</p>
        <h1>Join the waitlist</h1>
        <p class="sub">
          Clerk handles the waitlist form and confirmation emails here.
          After you join, you'll be sent back to the homepage.
        </p>

        <div id="waitlist-root"></div>

        <p id="waitlistError" class="error" hidden>
          Unable to load the waitlist form right now. Please refresh the page or email
          <a href="mailto:15010209342lyw@gmail.com">15010209342lyw@gmail.com</a>.
        </p>
      </section>
    </main>

    <script
      defer
      crossorigin="anonymous"
      src="https://main-monitor-38.clerk.accounts.dev/npm/@clerk/ui@1/dist/ui.browser.js"
      type="text/javascript"
    ></script>

    <script
      defer
      crossorigin="anonymous"
      data-clerk-publishable-key="pk_test_bWFpbi1tb25pdG9yLTM4LmNsZXJrLmFjY291bnRzLmRldiQ"
      src="https://main-monitor-38.clerk.accounts.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
      type="text/javascript"
    ></script>

    <script>
      function prefillEmailWhenReady(email) {
        if (!email) return;

        const root = document.getElementById('waitlist-root');
        let attempts = 0;
        const timer = setInterval(() => {
          attempts += 1;
          const input = root.querySelector('input[type="email"]');
          if (input) {
            input.value = email;
            input.dispatchEvent(new Event('input', { bubbles: true }));
            input.dispatchEvent(new Event('change', { bubbles: true }));
            clearInterval(timer);
          } else if (attempts >= 40) {
            clearInterval(timer);
          }
        }, 250);
      }

      window.addEventListener('load', async function () {
        const root = document.getElementById('waitlist-root');
        const error = document.getElementById('waitlistError');
        const initialEmail = new URLSearchParams(window.location.search).get('email') || '';

        try {
          await Clerk.load({
            ui: { ClerkUI: window.__internal_ClerkUICtor },
          });

          if (typeof Clerk.mountWaitlist !== 'function') {
            throw new Error('Clerk Waitlist UI is unavailable.');
          }

          Clerk.mountWaitlist(root, {
            afterJoinWaitlistUrl: '/?joined=1',
          });

          prefillEmailWhenReady(initialEmail);
        } catch (err) {
          error.hidden = false;
          console.error('Clerk waitlist mount error:', err);
        }
      });
    </script>
  </body>
</html>
